<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Merge Sort Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --surface:   #111318;
      --panel:     #161b22;
      --border:    #2a2f3a;
      --neon:      #00ff88;
      --neon-dim:  #00ff8840;
      --neon-glow: 0 0 8px #00ff88aa, 0 0 24px #00ff8844;
      --accent:    #ff6b35;
      --accent-dim:#ff6b3530;
      --blue:      #38bdf8;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --compare:   #facc15;
      --merge:     #a78bfa;
      --sorted:    #00ff88;
    }

    html { font-size: 16px; }
    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }

    /* scanline */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
      pointer-events: none; z-index: 999;
    }
    /* grid */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,.025) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none; z-index: 0;
    }

    .wrapper {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 14px 60px;
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 24px; }

    .title-badge {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.35rem, 5.5vw, 2.6rem);
      font-weight: 900;
      letter-spacing: .07em;
      color: var(--neon);
      text-shadow: var(--neon-glow);
    }
    .title-badge::after { content: '_'; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .subtitle {
      color: var(--muted);
      font-size: clamp(.6rem, 2.5vw, .75rem);
      letter-spacing: .14em;
      margin-top: 4px;
    }

    /* ── Control Panel ── */
    .control-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field label,
    .row-label {
      display: block;
      font-size: clamp(.6rem, 2.4vw, .68rem);
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(.78rem, 3vw, .9rem);
      padding: 10px 12px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
    }
    .field input:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 2px var(--neon-dim);
    }
    .field input::placeholder { color: var(--muted); }

    /* second row: toggle + speed + buttons */
    .ctrl-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }

    /* toggle */
    .toggle-wrap { flex: 0 0 auto; }
    .toggle-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 14px;
      height: 40px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(.7rem, 2.8vw, .82rem);
      color: var(--text);
      transition: all .2s;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-icon { transition: transform .35s; }
    .toggle-btn.asc  { border-color: var(--neon);   color: var(--neon); }
    .toggle-btn.desc { border-color: var(--accent);  color: var(--accent); }

    /* speed */
    .speed-wrap {
      flex: 1 1 120px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .speed-row {
      display: flex; align-items: center; gap: 8px;
      font-size: clamp(.6rem, 2.2vw, .7rem);
      color: var(--muted);
    }
    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--neon);
      cursor: pointer;
      box-shadow: 0 0 6px var(--neon)88;
    }
    input[type=range]::-moz-range-thumb {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--neon);
      border: none;
      cursor: pointer;
    }

    /* buttons */
    .btn-group { display: flex; gap: 8px; flex: 0 0 auto; align-items: flex-end; }
    .btn {
      height: 40px;
      padding: 0 16px;
      border: none;
      border-radius: 4px;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(.7rem, 2.8vw, .82rem);
      letter-spacing: .06em;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-sort { background: var(--neon); color: #0a0c0f; font-weight: bold; }
    .btn-sort:hover:not(:disabled) { box-shadow: var(--neon-glow); filter: brightness(1.1); }
    .btn-sort:disabled { opacity: .4; cursor: not-allowed; }
    .btn-reset { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-reset:hover { background: var(--accent-dim); }

    /* ── Stats ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-chip {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-label {
      font-size: clamp(.5rem, 2vw, .62rem);
      color: var(--muted);
      letter-spacing: .1em;
    }
    .stat-val {
      font-size: clamp(.88rem, 3.5vw, 1.1rem);
      font-weight: bold;
      transition: color .3s;
    }
    .stat-val.neon   { color: var(--neon); text-shadow: 0 0 6px var(--neon); }
    .stat-val.accent { color: var(--accent); }
    .stat-val.blue   { color: var(--blue); }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      margin-bottom: 14px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: clamp(.56rem, 2.2vw, .7rem);
      color: var(--muted);
    }
    .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    /* ── Visualizer ── */
    .viz-container {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 12px 12px;
      position: relative;
      overflow: hidden;
    }
    .viz-label {
      position: absolute;
      top: 9px; left: 14px;
      font-size: clamp(.5rem, 2vw, .62rem);
      letter-spacing: .16em;
      color: var(--muted);
    }

    #bars-wrapper {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: clamp(2px, 0.7vw, 5px);
      height: clamp(160px, 38vw, 280px);
      padding-bottom: 2px;
      overflow: hidden;
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
      flex: 1 1 0;
      min-width: 0;
      max-width: 60px;
      height: 100%;
    }

    .bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      transition: height .32s cubic-bezier(.4,0,.2,1), background .22s;
      min-height: 4px;
    }
    .bar.idle    { background: linear-gradient(180deg,#334155,#1e293b); }
    .bar.compare { background: linear-gradient(180deg,var(--compare),#ca8a04); box-shadow: 0 0 8px var(--compare)55; }
    .bar.merge   { background: linear-gradient(180deg,var(--merge),#7c3aed);   box-shadow: 0 0 8px var(--merge)55; }
    .bar.sorted  { background: linear-gradient(180deg,var(--sorted),#059669);  box-shadow: 0 0 8px var(--sorted)55; }

    .bar-label {
      font-size: clamp(.42rem, 1.6vw, .65rem);
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      line-height: 1;
    }
    .bar-col.hide-label .bar-label { display: none; }

    /* ── Status ── */
    #status-text {
      text-align: center;
      font-size: clamp(.62rem, 2.5vw, .78rem);
      letter-spacing: .1em;
      color: var(--muted);
      margin: 12px 4px 0;
      min-height: 18px;
      line-height: 1.5;
    }
    #status-text.done { color: var(--neon); text-shadow: 0 0 8px var(--neon)88; }

    /* ── Log ── */
    .log-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 14px;
      overflow: hidden;
    }
    .log-header {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      font-size: clamp(.56rem, 2.2vw, .7rem);
      letter-spacing: .14em;
      color: var(--muted);
    }
    .log-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--neon);
      flex-shrink: 0;
      animation: pdot 1.8s ease-in-out infinite;
    }
    @keyframes pdot {
      0%,100% { opacity:1; box-shadow: 0 0 4px var(--neon); }
      50%      { opacity:.3; box-shadow:none; }
    }
    #log-list {
      max-height: clamp(120px, 25vw, 180px);
      overflow-y: auto;
      padding: 6px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      overscroll-behavior: contain;
    }
    .log-entry {
      padding: 4px 14px;
      font-size: clamp(.58rem, 2.3vw, .73rem);
      display: flex;
      gap: 10px;
      align-items: baseline;
      animation: fadeSlide .28s ease;
    }
    @keyframes fadeSlide {
      from { opacity:0; transform:translateX(-6px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .log-iter { color: var(--accent); min-width: 52px; font-size: clamp(.54rem, 2vw, .67rem); }
    .log-msg  { color: var(--text); line-height: 1.45; }
    .log-msg span.hl { color: var(--neon); }

    /* ── Responsive ── */
    @media (min-width: 560px) {
      .ctrl-row { flex-wrap: nowrap; }
    }
    @media (min-width: 720px) {
      .wrapper { padding: 28px 20px 60px; }
      .control-panel { padding: 20px 22px; gap: 14px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="title-badge">MERGE SORT</div>
    <div class="subtitle">// ALGORITHM VISUALIZER v2.0</div>
  </header>

  <!-- Control Panel -->
  <div class="control-panel">

    <div class="field">
      <label>// INPUT ARRAY — COMMA SEPARATED</label>
      <input id="input-nums" type="text" inputmode="decimal"
             placeholder="e.g. 38, 27, 43, 3, 9, 82, 10"/>
    </div>

    <div class="ctrl-row">

      <div class="toggle-wrap">
        <div class="row-label">// ORDER</div>
        <button class="toggle-btn asc" id="order-toggle" onclick="toggleOrder()">
          <span class="toggle-icon" id="toggle-icon">↑</span>
          <span id="order-label">ASCENDING</span>
        </button>
      </div>

      <div class="speed-wrap">
        <div class="row-label">// SPEED</div>
        <div class="speed-row">
          <span>SLOW</span>
          <input type="range" id="speed-slider" min="1" max="5" value="3"/>
          <span>FAST</span>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-sort" id="sort-btn" onclick="startSort()">▶ SORT</button>
        <button class="btn btn-reset" onclick="resetAll()">⟳ RESET</button>
      </div>

    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-chip">
      <span class="stat-label">ITERATION</span>
      <span class="stat-val neon"   id="stat-iter">0</span>
    </div>
    <div class="stat-chip">
      <span class="stat-label">COMPARISONS</span>
      <span class="stat-val accent" id="stat-comp">0</span>
    </div>
    <div class="stat-chip">
      <span class="stat-label">MERGES</span>
      <span class="stat-val blue"   id="stat-merge">0</span>
    </div>
    <div class="stat-chip">
      <span class="stat-label">ARRAY SIZE</span>
      <span class="stat-val" id="stat-size" style="color:var(--text)">–</span>
    </div>
    <div class="stat-chip">
      <span class="stat-label">ORDER</span>
      <span class="stat-val" id="stat-order" style="color:var(--muted)">–</span>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#334155"></div>UNSORTED</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--compare)"></div>COMPARING</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--merge)"></div>MERGING</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--sorted)"></div>SORTED</div>
  </div>

  <!-- Visualizer -->
  <div class="viz-container">
    <div class="viz-label">ARRAY VISUALIZER</div>
    <div id="bars-wrapper"></div>
  </div>

  <div id="status-text">// ENTER NUMBERS AND PRESS SORT</div>

  <!-- Log -->
  <div class="log-panel">
    <div class="log-header">
      <div class="log-dot"></div>
      EXECUTION LOG
    </div>
    <div id="log-list"></div>
  </div>

</div>

<script>
  /* ── State ── */
  let arr       = [];
  let isRunning = false;
  let ascending = true;
  let iterCount = 0, compCount = 0, mergeCount = 0;
  let steps     = [];
  let animTimer = null;

  /* ── Delay ── */
  function getDelay() {
    return [700, 420, 230, 100, 30][+document.getElementById('speed-slider').value - 1];
  }

  /* ── Toggle order ── */
  function toggleOrder() {
    if (isRunning) return;
    ascending = !ascending;
    const btn = document.getElementById('order-toggle');
    btn.className = 'toggle-btn ' + (ascending ? 'asc' : 'desc');
    document.getElementById('order-label').textContent = ascending ? 'ASCENDING' : 'DESCENDING';
    document.getElementById('toggle-icon').textContent = ascending ? '↑' : '↓';
  }

  /* ── Reset ── */
  function resetAll() {
    if (animTimer) clearTimeout(animTimer);
    isRunning = false;
    arr = []; steps = [];
    iterCount = compCount = mergeCount = 0;
    document.getElementById('input-nums').value = '';
    document.getElementById('bars-wrapper').innerHTML = '';
    document.getElementById('log-list').innerHTML = '';
    ['stat-iter','stat-comp','stat-merge'].forEach(id =>
      document.getElementById(id).textContent = '0');
    document.getElementById('stat-size').textContent = '–';
    document.getElementById('stat-order').textContent = '–';
    document.getElementById('stat-order').style.color = 'var(--muted)';
    const st = document.getElementById('status-text');
    st.textContent = '// ENTER NUMBERS AND PRESS SORT';
    st.className = '';
    document.getElementById('sort-btn').disabled = false;
  }

  /* ── Parse ── */
  function parseInput() {
    const raw = document.getElementById('input-nums').value.trim();
    if (!raw) return null;
    const nums = raw.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
    return nums.length >= 2 ? nums : null;
  }

  /* ── Render bars ── */
  function renderBars(array, states) {
    const wrap  = document.getElementById('bars-wrapper');
    const wrapH = wrap.clientHeight || 200;
    const maxVal = Math.max(...array.map(Math.abs), 1);
    const n = array.length;

    wrap.innerHTML = '';
    array.forEach((val, i) => {
      const col = document.createElement('div');
      col.className = 'bar-col' + (n > 20 ? ' hide-label' : '');

      const bar = document.createElement('div');
      bar.className = 'bar ' + (states[i] || 'idle');
      bar.style.height = Math.max(4, (Math.abs(val) / maxVal) * (wrapH - 22)) + 'px';

      const lbl = document.createElement('div');
      lbl.className = 'bar-label';
      lbl.textContent = val;

      col.appendChild(bar);
      col.appendChild(lbl);
      wrap.appendChild(col);
    });
  }

  /* ── Apply step ── */
  function applyStep(step) {
    arr = step.array.slice();
    iterCount  = step.iter;
    compCount  = step.comp;
    mergeCount = step.merges;
    renderBars(arr, step.states);
    document.getElementById('stat-iter').textContent  = iterCount;
    document.getElementById('stat-comp').textContent  = compCount;
    document.getElementById('stat-merge').textContent = mergeCount;
    if (step.logMsg) addLog(iterCount, step.logMsg);
  }

  /* ── Log ── */
  function addLog(iter, msg) {
    const list  = document.getElementById('log-list');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML =
      `<span class="log-iter">[ITER ${String(iter).padStart(3,'0')}]</span>` +
      `<span class="log-msg">${msg}</span>`;
    list.appendChild(entry);
    list.scrollTop = list.scrollHeight;
  }

  /* ── Compute steps (bottom-up merge sort) ── */
  function computeSteps(input) {
    steps = [];
    const w = input.slice();
    const n = w.length;
    let iter = 0, comp = 0, merges = 0;

    function push(type, arr, states, logMsg) {
      steps.push({ type, array: arr.slice(), states: states.slice(),
                   iter, comp, merges, logMsg });
    }

    for (let size = 1; size < n; size *= 2) {
      iter++;
      push('iter-start', w, new Array(n).fill('idle'),
        `<span class="hl">ITERATION ${iter}</span> — subarray size <span class="hl">${size}</span>`);

      for (let left = 0; left < n; left += 2 * size) {
        const mid   = Math.min(left + size - 1, n - 1);
        const right = Math.min(left + 2 * size - 1, n - 1);
        if (mid >= right) continue;

        merges++;
        const preS = new Array(n).fill('idle');
        for (let x = left; x <= right; x++) preS[x] = 'merge';
        push('merge-start', w, preS,
          `Merging <span class="hl">[${left}..${mid}]</span> + <span class="hl">[${mid+1}..${right}]</span>`);

        const temp = [];
        let i = left, j = mid + 1;
        while (i <= mid && j <= right) {
          comp++;
          const cS = preS.slice(); cS[i] = cS[j] = 'compare';
          push('compare', w, cS,
            `Comparing <span class="hl">${w[i]}</span> vs <span class="hl">${w[j]}</span>`);
          if (ascending ? w[i] <= w[j] : w[i] >= w[j]) temp.push(w[i++]);
          else                                           temp.push(w[j++]);
        }
        while (i <= mid)   temp.push(w[i++]);
        while (j <= right) temp.push(w[j++]);
        for (let k = 0; k < temp.length; k++) w[left + k] = temp[k];

        const postS = new Array(n).fill('idle');
        for (let x = left; x <= right; x++) postS[x] = 'sorted';
        push('merge-done', w, postS,
          `Merged → <span class="hl">[${w.slice(left, right+1).join(', ')}]</span>`);
      }
    }

    push('done', w, new Array(n).fill('sorted'),
      `<span class="hl">✓ COMPLETE</span> — ${iter} iter · ${comp} comparisons · ${merges} merges`);
  }

  /* ── Animate ── */
  function animateSteps(idx) {
    if (idx >= steps.length) {
      isRunning = false;
      document.getElementById('sort-btn').disabled = false;
      const st = document.getElementById('status-text');
      st.textContent = `// ✓ DONE — ${iterCount} ITERATIONS | ${compCount} COMPARISONS | ${mergeCount} MERGES`;
      st.className = 'done';
      return;
    }
    applyStep(steps[idx]);
    animTimer = setTimeout(() => animateSteps(idx + 1), getDelay());
  }

  /* ── Start ── */
  function startSort() {
    if (isRunning) return;
    const nums = parseInput();
    if (!nums) {
      document.getElementById('status-text').textContent = '// ⚠ ENTER AT LEAST 2 VALID NUMBERS';
      return;
    }
    isRunning = true;
    document.getElementById('sort-btn').disabled = true;
    document.getElementById('log-list').innerHTML = '';
    iterCount = compCount = mergeCount = 0;
    document.getElementById('stat-size').textContent  = nums.length;
    document.getElementById('stat-order').textContent = ascending ? 'ASC ↑' : 'DESC ↓';
    document.getElementById('stat-order').style.color = ascending ? 'var(--neon)' : 'var(--accent)';
    const st = document.getElementById('status-text');
    st.textContent = '// RUNNING MERGE SORT…'; st.className = '';
    arr = nums.slice();
    renderBars(arr, new Array(arr.length).fill('idle'));
    computeSteps(arr);
    animateSteps(0);
  }

  /* ── Keyboard ── */
  document.getElementById('input-nums').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !isRunning) startSort();
  });
</script>
</body>
</html>
